<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando - WhatsApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --wa-green: #25d366;
      --wa-dark: #075e54;
      --wa-accent: #128c7e;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(120deg, #e0ffe8 0%, #b8e1fc 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: var(--wa-dark);
    }
    .container {
      text-align: center;
      background: white;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 90%;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      margin-bottom: 24px;
      color: var(--wa-accent);
    }
    .progress {
      width: 100%;
      height: 8px;
      background: #e0f2f1;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #25d366, #128c7e);
      animation: load 5s linear forwards;
    }
    @keyframes load {
      to { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gracias por confirmar tu cuenta</h1>
    <p>Ya estamos terminando...</p>
    <div class="progress">
      <div class="progress-bar"></div>
    </div>
  </div>

  <script>
    setTimeout(() => {
      window.location.href = 'final.html';
    }, 5000);
  </script>
</body>
</html>
